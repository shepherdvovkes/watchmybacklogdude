# docker-compose.yml
version: '3.8'

services:
  # Наше основное приложение
  webapp:
    build: .
    container_name: watchmybacklogdude_app
    ports:
      # Порт, на котором работает FastAPI/Uvicorn
      - "8080:8080"
      # Порт, на котором Prometheus-клиент отдает метрики
      - "8001:8001"
    volumes:
      # Синхронизируем код для удобства разработки
      - ./api:/app/api
      - ./static:/app/static
      - ./templates:/app/templates
      - ./data:/app/data
    # Передаем API ключи из .env файла в контейнер
    env_file:
      - .env
    # Для macOS, чтобы 'log stream' работал, нужны расширенные права.
    # ВНИМАНИЕ: Это небезопасно для production, но необходимо для демонстрации.
    cap_add:
      - SYS_ADMIN
      - SYS_PTRACE
    # В некоторых системах может понадобиться privileged: true

  # Prometheus для сбора метрик
  prometheus:
    image: prom/prometheus:v2.47.1
    container_name: prometheus
    ports:
      # Маппим порт 9090 на 4200 на хосте
      - "4200:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - webapp

  # Grafana для визуализации метрик
  grafana:
    image: grafana/grafana:10.1.5
    container_name: grafana
    ports:
      # Маппим порт 3000 на 4201 на хосте
      - "4201:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana-storage:

